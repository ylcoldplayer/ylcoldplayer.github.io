<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YL Coldplayer</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    <script defer src="script.js"></script>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#books">Books</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    
    <section id="about">
        <h1>About Me</h1>
        <p>Welcome to my website. Here you will find information about my books and more.</p>
    </section>
    
    <section id="books">
        <h1>Books</h1>
        <p>Details about my books will be listed here.</p>
    </section>
    
    <section id="contact">
        <h1>Contact</h1>
        <p>Reach me at: <a href="mailto:your@email.com">your@email.com</a></p>
    </section>
    
    <footer>
        <p>Visitor Count: <span id="visitor-count">Loading...</span></p>
        <div id="admin-section" style="display: none;">
            <h3>Visitor IPs</h3>
            <ul id="visitor-ips"></ul>
        </div>
    </footer>
</body>
</html>
